# lines.knowyourself.com.cn —— 彩球连珠（独立子域名，不碰现有站点配置）
# 放到 ECS：/etc/nginx/sites-available/color-lines.conf
# 再软链：ln -s /etc/nginx/sites-available/color-lines.conf /etc/nginx/sites-enabled/
# 先用 HTTP（80）跑通，再 certbot --nginx 自动补 443 + 跳转。
server {
    listen 80;
    listen [::]:80;
    server_name lines.knowyourself.com.cn;   # ← 改成你要用的子域名

    root /var/www/color-lines;   # git clone 的仓库根，index.html 在这里
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # 代码体积很小、更新后文件名不变，关掉强缓存，保证 git pull 后立即生效
    location ~* \.(html|js|css)$ {
        add_header Cache-Control "no-cache";
    }
}
